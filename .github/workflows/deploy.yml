# Deploy as non-root user "madhu" to /opt/deals only.
#
# Required secrets:
#   DEPLOY_HOST     — server IP
#   DEPLOY_USER     — madhu
#   DEPLOY_SSH_KEY  — private key authorized for madhu
#
# Optional:
#   DEPLOY_PORT     — SSH port (default 22)

name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          missing=0
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::DEPLOY_HOST is missing."
            missing=1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER is missing. Set to: madhu"
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY is missing (private key for madhu)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY must be a private key (BEGIN ... PRIVATE KEY)."
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "END.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY missing END line (truncated paste)."
            exit 1
          fi
          echo "Secrets OK. host=${DEPLOY_HOST} user=${DEPLOY_USER} path=/opt/deals"

      - name: Deploy over SSH as madhu
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail

            APP_DIR=/opt/deals
            echo "User=$(whoami) APP_DIR=${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              echo "ERROR: App not found at ${APP_DIR}."
              exit 1
            fi

            cd "${APP_DIR}"

            # Avoid git "dubious ownership" after chown between root/madhu
            git config --global --add safe.directory "${APP_DIR}" || true

            # 1) Pull FIRST so we never run a stale deploy.sh that still requires root
            echo "Pulling latest main..."
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            chmod +x deploy.sh docker/entrypoint.sh 2>/dev/null || true

            # 2) Update using latest script (no root required)
            export APP_DIR=/opt/deals
            export BRANCH=main
            export DOMAIN=deals.madhudadi.in
            export DEPLOY_USER=madhu
            export APP_PORT=3002
            ./deploy.sh --update

            # Ensure nginx config from repo is installed (if passwordless sudo available)
            if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
              echo "Installing nginx config from repo via sudo..."
              sudo APP_DIR=/opt/deals DOMAIN=deals.madhudadi.in APP_PORT=3002 \
                bash /opt/deals/scripts/setup-nginx-deals.sh || true
            fi

            echo "Waiting for health on :3002..."
            for i in $(seq 1 40); do
              if curl -fsS "http://127.0.0.1:3002/" >/dev/null 2>&1; then
                echo "Healthy."
                exit 0
              fi
              sleep 3
            done
            echo "Health check timed out:"
            docker compose logs --tail=100 || true
            exit 1
