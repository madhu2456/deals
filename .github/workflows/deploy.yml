# Deploy Deals to DigitalOcean / Netcup on push to main.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — server IP
#   DEPLOY_USER     — SSH user (e.g. root)
#   DEPLOY_SSH_KEY  — FULL private key (see notes below)
#
# Optional:
#   DEPLOY_PORT     — SSH port (default 22)
#   DEPLOY_PATH     — default /opt/deals
#
# DEPLOY_SSH_KEY must look like:
#   -----BEGIN OPENSSH PRIVATE KEY-----
#   ....many lines....
#   -----END OPENSSH PRIVATE KEY-----
# Paste the private file only (NOT .pub). No quotes. Include BEGIN/END lines.
# Prefer creating the key on your laptop, add .pub to server authorized_keys.

name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          missing=0
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::DEPLOY_HOST is missing. Set your server IP."
            missing=1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER is missing (e.g. root)."
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::DEPLOY_SSH_KEY is missing."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          # Validate private-key shape (do not print the key)
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY does not look like a private key."
            echo "It must contain a line like: -----BEGIN OPENSSH PRIVATE KEY-----"
            echo "You may have pasted the .pub file, a fingerprint, or an incomplete key."
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "END.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY is missing the END line (paste was cut off)."
            exit 1
          fi
          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN OPENSSH PUBLIC KEY\|ssh-ed25519\|ssh-rsa "; then
            # public keys often start with ssh-ed25519 / ssh-rsa (single line)
            if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
              echo "::error::DEPLOY_SSH_KEY looks like a PUBLIC key. Use the private file (no .pub)."
              exit 1
            fi
          fi

          # Normalize Windows newlines if someone pasted from Windows
          KEY_LINES=$(printf '%s' "$DEPLOY_SSH_KEY" | tr -d '\r' | wc -l)
          echo "Secrets OK. host=${DEPLOY_HOST} user=${DEPLOY_USER} key_lines≈${KEY_LINES}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # Helpful when key was pasted with odd whitespace
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/deals"
            fi

            echo "Deploying to ${APP_DIR}..."

            if [ ! -d "${APP_DIR}/.git" ]; then
              echo "ERROR: App not found at ${APP_DIR}."
              echo "Bootstrap once on the server:"
              echo "  git clone https://github.com/madhu2456/deals.git ${APP_DIR}"
              echo "  cd ${APP_DIR} && chmod +x deploy.sh docker/entrypoint.sh && ./deploy.sh"
              exit 1
            fi

            cd "${APP_DIR}"
            export APP_DIR
            export BRANCH=main
            chmod +x deploy.sh docker/entrypoint.sh 2>/dev/null || true
            ./deploy.sh --update

            echo "Waiting for health..."
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:3000/" >/dev/null 2>&1; then
                echo "Healthy."
                exit 0
              fi
              sleep 2
            done
            echo "Health check timed out:"
            docker compose -f "${APP_DIR}/docker-compose.yml" logs --tail=80 || true
            exit 1
