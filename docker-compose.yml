# Port map on the Netcup server:
#   madhudadi.in (portfolio) → host :3000
#   blog                     → 127.0.0.1:3001
#   deals (this app)         → 127.0.0.1:3002  ← HOST port
#   udemy-enroller           → :8000
#
# Inside the container Next still listens on 3000; only the HOST maps to 3002.
# Nginx deals.madhudadi.in → proxy_pass http://127.0.0.1:3002

services:
  deals:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://deals.madhudadi.in}
    container_name: deals-app
    restart: unless-stopped
    ports:
      # Host 3002 → container 3000 (do not use host 3000 — madhudadi.in uses it)
      - "127.0.0.1:3002:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/deals.db}
      NODE_ENV: production
      # Port INSIDE the container (unchanged)
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      RUN_SEED: ${RUN_SEED:-false}
      APP_PORT: "3002"
    volumes:
      - deals_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  deals_data:
