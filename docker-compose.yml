# Port map (this server):
#   blog frontend  → 127.0.0.1:3001
#   deals          → 127.0.0.1:3002  (this service)
#   udemy-enroller → 0.0.0.0:8000
#   blog backend   → 127.0.0.1:8001
#
# Nginx for deals.madhudadi.in should proxy_pass http://127.0.0.1:3002

services:
  deals:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://deals.madhudadi.in}
    container_name: deals-app
    restart: unless-stopped
    ports:
      # Bind localhost only — public traffic comes via Nginx
      - "127.0.0.1:${APP_PORT:-3002}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/deals.db}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - deals_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  deals_data:
