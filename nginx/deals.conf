# Deals — managed in git (nginx/deals.conf)
# Installed to /etc/nginx/sites-available/deals on every deploy.
# Placeholders __DOMAIN__ and __APP_PORT__ are filled by deploy.sh.
#
# Upstream: Next.js container bound to 127.0.0.1:__APP_PORT__

# -----------------------------------------------------------------------------
# HTTP — ACME + redirect to HTTPS when certs exist (deploy may rewrite this file)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:__APP_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}
